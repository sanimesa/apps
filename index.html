<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuvro's Mosaic</title>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --muted: #64748b;
            --finance: #10b981;
            --tech: #6366f1;
            --genai: #f59e0b;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            text-align: center;
            margin: 1rem 0 2rem 0;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: -1px;
            color: var(--accent);
        }
        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-auto-rows: 180px;
            gap: 12px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .tile {
            background: var(--card-bg);
            padding: 1.2rem;
            border-radius: 8px;
            border: 1px solid #334155;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        /* Implemented tiles look active */
        .tile.implemented {
            opacity: 1;
            cursor: pointer;
        }
        .tile.implemented:hover {
            transform: scale(1.02);
            border-color: var(--accent);
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        /* Unimplemented tiles are ghosted/transparent */
        .tile.unimplemented {
            opacity: 0.25;
            cursor: default;
            border-style: dashed;
        }
        .topic {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }
        .topic.finance { color: var(--finance); }
        .topic.tech { color: var(--tech); }
        .topic.gen-ai { color: var(--genai); }
        
        .tile h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1rem;
            line-height: 1.2;
        }
        .tile p {
            font-size: 0.8rem;
            color: var(--muted);
            margin: 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .status-dot {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            display: none;
        }
        .implemented .status-dot {
            display: block;
            box-shadow: 0 0 8px var(--accent);
        }

        /* Material Watchlist Styles */
        .price-list {
            margin-top: 5px;
            font-size: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .price-item {
            display: flex;
            justify-content: space-between;
            color: var(--text);
        }

        @media (max-width: 1200px) { .mosaic-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 800px) { .mosaic-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .mosaic-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1>SHUVRO'S MOSAIC</h1>
    </header>

    <div class="mosaic-grid" id="mosaic"></div>

    <script>
        const data = [
            { title: "Materials Watchlist", topic: "Finance", desc: "COPX, REMX, and sector peers.", link: "#", category: "finance", implemented: true, isWatchlist: true },
            { title: "GitHub Repo", topic: "Tech", desc: "Source code for this mosaic.", link: "https://github.com/sanimesa/apps", category: "tech", implemented: true },
            { title: "OpenClaw Docs", topic: "Tech", desc: "AI agent framework documentation.", link: "https://docs.openclaw.ai", category: "tech", implemented: true },
            { title: "ClawHub", topic: "Gen AI", desc: "AI agent skills marketplace.", link: "https://clawhub.com", category: "gen-ai", implemented: true },
            
            // Unimplemented placeholders
            { title: "Note Taker", topic: "Tech", desc: "Temporarily offline for security upgrades.", link: "#", category: "tech", implemented: false },
            { title: "Portfolio Tracker", topic: "Finance", desc: "Live view of market holdings.", link: "#", category: "finance", implemented: false },
            { title: "Gemini 1.5 Pro", topic: "Gen AI", desc: "Google's multi-modal LLM interface.", link: "#", category: "gen-ai", implemented: false },
            { title: "Market Momentum", topic: "Finance", desc: "Relative strength analysis.", link: "#", category: "finance", implemented: false },
            { title: "Yield Curves", topic: "Finance", desc: "Macro indicator monitoring.", link: "#", category: "finance", implemented: false },
            { title: "BTC Tracker", topic: "Finance", desc: "Bitcoin price dashboard.", link: "#", category: "finance", implemented: false },
            { title: "Local LLMs", topic: "Gen AI", desc: "Notes on Ollama/LM Studio.", link: "#", category: "gen-ai", implemented: false },
            { title: "Agentic Workflows", topic: "Gen AI", desc: "Multi-agent system design.", link: "#", category: "gen-ai", implemented: false },
            { title: "Options Flow", topic: "Finance", desc: "Unusual activity monitor.", link: "#", category: "finance", implemented: false },
            { title: "Rust Learning", topic: "Tech", desc: "Memory safety notes.", link: "#", category: "tech", implemented: false },
            { title: "Stability AI", topic: "Gen AI", desc: "Image generation tools.", link: "#", category: "gen-ai", implemented: false },
            { title: "Fed Watch", topic: "Finance", desc: "Rate hike probabilities.", link: "#", category: "finance", implemented: false },
            { title: "VS Code Setup", topic: "Tech", desc: "Productivity extensions.", link: "#", category: "tech", implemented: false },
            { title: "Neural Networks", topic: "Gen AI", desc: "Deep learning math.", link: "#", category: "gen-ai", implemented: false },
            { title: "Macro Views", topic: "Finance", desc: "Global economic trends.", link: "#", category: "finance", implemented: false },
            { title: "API Keys", topic: "Tech", desc: "Secure secret management.", link: "#", category: "tech", implemented: false },
            { title: "Model Eval", topic: "Gen AI", desc: "LLM benchmarking.", link: "#", category: "gen-ai", implemented: false },
            { title: "Stock Alerts", topic: "Finance", desc: "Custom price targets.", link: "#", category: "finance", implemented: false },
            { title: "Shell Scripts", topic: "Tech", desc: "Automation routines.", link: "#", category: "tech", implemented: false },
            { title: "Project X", topic: "Tech", desc: "Hidden experiment.", link: "#", category: "tech", implemented: false }
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const grid = document.getElementById('mosaic');
        
        shuffle(data).forEach(item => {
            const tile = document.createElement(item.implemented ? 'a' : 'div');
            if(item.implemented && item.link !== "#") tile.href = item.link;
            
            tile.className = `tile ${item.implemented ? 'implemented' : 'unimplemented'}`;
            
            let content = `
                <div class="status-dot"></div>
                <div class="topic ${item.category}">${item.topic}</div>
                <h3>${item.title}</h3>
                <p>${item.desc}</p>
            `;

            // Special handling for the Materials Watchlist
            if (item.isWatchlist) {
                content += `
                    <div class="price-list">
                        <div class="price-item"><span>COPX</span> <span style="color:var(--finance)">+1.2%</span></div>
                        <div class="price-item"><span>REMX</span> <span style="color:#ef4444">-0.8%</span></div>
                        <div class="price-item"><span>URA</span> <span style="color:var(--finance)">+2.4%</span></div>
                    </div>
                `;
            }

            tile.innerHTML = content;
            grid.appendChild(tile);
        });
    </script>
</body>
</html>
