<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuvro's Mosaic</title>
    <style>
        :root {
            --bg: #020617;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
            --muted: #94a3b8;
            --finance: #10b981;
            --tech: #6366f1;
            --genai: #f59e0b;
            --social: #ef4444;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            text-align: center;
            margin: 1rem 0 2rem 0;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: -1px;
            color: var(--accent);
        }
        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-auto-rows: 180px;
            gap: 12px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .tile {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid #334155;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .tile-content {
            padding: 1.2rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.9) 100%);
        }
        .tile-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: transform 0.5s ease;
        }
        .tile:hover .tile-bg {
            transform: scale(1.1);
        }
        .tile.implemented {
            opacity: 1;
            cursor: pointer;
        }
        .tile.implemented:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .tile.unimplemented {
            opacity: 0.25;
            cursor: default;
            border-style: dashed;
        }
        .topic {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }
        .topic.finance { color: var(--finance); }
        .topic.tech { color: var(--tech); }
        .topic.gen-ai { color: var(--genai); }
        .topic.social { color: var(--social); }
        
        .tile h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1rem;
            line-height: 1.2;
        }
        .tile p {
            font-size: 0.8rem;
            color: var(--muted);
            margin: 0;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .status-dot {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            display: none;
            z-index: 3;
        }
        .implemented .status-dot {
            display: block;
            box-shadow: 0 0 8px var(--accent);
        }
        @media (max-width: 1200px) { .mosaic-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 800px) { .mosaic-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .mosaic-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1>SHUVRO'S MOSAIC</h1>
    </header>

    <div class="mosaic-grid" id="mosaic"></div>

    <script>
        const data = [
            { title: "Semi Equipment Viz", topic: "Finance", desc: "Bubble chart for industry tickers.", link: "semi-viz/", category: "finance", implemented: true, bg: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=400&q=80" },
            { title: "Materials Watchlist", topic: "Finance", desc: "COPX, REMX, and sector peers.", link: "#", category: "finance", implemented: true },
            { title: "GitHub Repo", topic: "Tech", desc: "Source code for this mosaic.", link: "https://github.com/sanimesa/apps", category: "tech", implemented: true },
            { title: "Chip Stock Investor", topic: "Social", desc: "Semiconductor industry analysis.", link: "https://www.youtube.com/@ChipStockInvestor", category: "social", implemented: true, bg: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=400&q=80" },
            { title: "Asianometry", topic: "Social", desc: "Deep dives on Asian tech history.", link: "https://www.youtube.com/@Asianometry", category: "social", implemented: true, bg: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=400&q=80" },
            { title: "Wall Street Millennial", topic: "Social", desc: "Modern business & finance stories.", link: "https://www.youtube.com/@WallStreetMillennial", category: "social", implemented: true, bg: "https://images.unsplash.com/photo-1611974717482-4800b1ee2e24?auto=format&fit=crop&w=400&q=80" },
            { title: "jukan05", topic: "Social", desc: "Macro & market insights on X.", link: "https://x.com/jukan05", category: "social", implemented: true },
            { title: "michaeljburry", topic: "Social", desc: "The Big Short's Cassandra.", link: "https://x.com/michaeljburry", category: "social", implemented: true },
            { title: "OpenClaw Docs", topic: "Tech", desc: "Agent framework docs.", link: "https://docs.openclaw.ai", category: "tech", implemented: true },
            { title: "ClawHub", topic: "Gen AI", desc: "Skills marketplace.", link: "https://clawhub.com", category: "gen-ai", implemented: true },
            
            { title: "Note Taker", topic: "Tech", desc: "Security upgrades in progress.", link: "#", category: "tech", implemented: false },
            { title: "Portfolio Tracker", topic: "Finance", desc: "Live view of market holdings.", link: "#", category: "finance", implemented: false },
            { title: "Gemini 1.5 Pro", topic: "Gen AI", desc: "Multi-modal LLM interface.", link: "#", category: "gen-ai", implemented: false },
            { title: "Market Momentum", topic: "Finance", desc: "Relative strength analysis.", link: "#", category: "finance", implemented: false },
            { title: "Yield Curves", topic: "Finance", desc: "Macro indicator monitoring.", link: "#", category: "finance", implemented: false },
            { title: "BTC Tracker", topic: "Finance", desc: "Bitcoin price dashboard.", link: "#", category: "finance", implemented: false },
            { title: "Local LLMs", topic: "Gen AI", desc: "Notes on Ollama/LM Studio.", link: "#", category: "gen-ai", implemented: false },
            { title: "Agentic Workflows", topic: "Gen AI", desc: "Multi-agent system design.", link: "#", category: "gen-ai", implemented: false },
            { title: "Options Flow", topic: "Finance", desc: "Unusual activity monitor.", link: "#", category: "finance", implemented: false },
            { title: "Rust Learning", topic: "Tech", desc: "Memory safety notes.", link: "#", category: "tech", implemented: false },
            { title: "Stability AI", topic: "Gen AI", desc: "Image generation tools.", link: "#", category: "gen-ai", implemented: false },
            { title: "Fed Watch", topic: "Finance", desc: "Rate hike probabilities.", link: "#", category: "finance", implemented: false },
            { title: "VS Code Setup", topic: "Tech", desc: "Productivity extensions.", link: "#", category: "tech", implemented: false },
            { title: "Neural Networks", topic: "Gen AI", desc: "Deep learning math.", link: "#", category: "gen-ai", implemented: false }
        ];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const grid = document.getElementById('mosaic');
        shuffle(data).forEach(item => {
            const tile = document.createElement(item.implemented ? 'a' : 'div');
            if(item.implemented && item.link !== "#") tile.href = item.link;
            tile.className = `tile ${item.implemented ? 'implemented' : 'unimplemented'}`;
            let bgStyle = item.bg ? `style="background-image: url('${item.bg}')"` : '';
            tile.innerHTML = `
                <div class="tile-bg" ${bgStyle}></div>
                <div class="status-dot"></div>
                <div class="tile-content">
                    <div class="topic ${item.category}">${item.topic}</div>
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                </div>
            `;
            grid.appendChild(tile);
        });
    </script>
</body>
</html>
